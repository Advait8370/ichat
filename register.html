<!DOCTYPE html>
<html>

<head>

  <title>Register</title>

  <link rel="stylesheet"
   href="css/auth.css">

</head>

<body>

<div class="auth-container">

  <h1>Create Account</h1>

  <input type="text"
   id="username"
   placeholder="Username">

  <input type="email"
   id="email"
   placeholder="Email">

  <input type="password"
   id="password"
   placeholder="Password">

  <button onclick="register()">
    Register
  </button>

</div>

<script type="module"
 src="js/auth.js"></script>

</body>
</html>
