<!DOCTYPE html>
<html>

<head>

  <title>iChat</title>

  <meta name="viewport"
   content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
   href="css/chat.css">

  <link href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
 rel="stylesheet">

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="profile">

      <img src="assets/default.png">

      <h2>iChat</h2>

    </div>

    <div class="stories"
     id="stories"></div>

    <div class="chat-list"
     id="chatList"></div>

  </div>

  <!-- CHAT -->

  <div class="chat-area">

    <div class="chat-header">

      <h3>Global Chat</h3>

    </div>

    <div class="messages"
     id="messages"></div>

    <div class="message-input">

      <input type="text"
       id="messageInput"
       placeholder="Message">

      <label>

        <i class="fa fa-image"></i>

        <input type="file"
         id="fileInput"
         hidden>

      </label>

      <button id="sendBtn">

        <i class="fa fa-paper-plane"></i>

      </button>

    </div>

  </div>

</div>

<script type="module"
 src="js/chat.js"></script>

</body>
</html>
