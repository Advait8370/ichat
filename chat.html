<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iChat V4</title>
  <link rel="stylesheet" href="css/chat.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="app">

  <nav class="wa-rail">
    <button class="active"><i class="fa fa-message"></i></button>
    <button><i class="fa fa-circle-notch"></i></button>
    <button><i class="fa fa-users"></i></button>
    <button onclick="openSettingsModal()"><i class="fa fa-gear"></i></button>
    <button onclick="openProfileModal()"><img src="assets/logo.png"></button>
  </nav>

  <aside class="sidebar">

    <div class="wa-title">
      <h1>iChat</h1>
      <div>
        <button><i class="fa fa-square-plus"></i></button>
        <button onclick="openSettingsModal()"><i class="fa fa-ellipsis-vertical"></i></button>
      </div>
    </div>

    <div class="profile" onclick="openProfileModal()">
      <img id="profilePic" src="assets/logo.png">
      <div>
        <h2>iChat</h2>
        <small id="myUsername">Loading...</small>
      </div>
    </div>

    <div class="search-box">
      <i class="fa fa-search"></i>
      <input id="searchInput" placeholder="Search or start a new chat">
    </div>

    <div class="wa-filters">
      <button class="active">All</button>
      <button>Family</button>
      <button>Friends</button>
    </div>

    <div id="searchResults"></div>

    <div class="group-tools">
      <input id="groupNameInput" placeholder="New group name">
      <button id="createGroupBtn">Create Group</button>
      <input id="groupInviteInput" placeholder="Username to add">
      <button id="addUserToGroupBtn">Add To Selected Group</button>
    </div>

    <div id="groupList"></div>

    <button id="logoutBtn" class="logout">Logout</button>
  </aside>

  <main class="chat-area">

    <header class="chat-header">
      <div>
        <h3 id="chatName">iChat</h3>
        <small id="typingText">Select a chat to start messaging</small>
      </div>
      <button id="voiceBtn"><i class="fa fa-microphone"></i></button>
    </header>

    <section class="stories">
      <label class="story-add">+<input id="storyInput" type="file" hidden></label>
      <button id="textStoryBtn">Text Status</button>
      <div id="storiesList"></div>
    </section>

    <section id="messages" class="messages">
      <div class="wa-home">
        <div class="wa-laptop">
          <i class="fa fa-laptop"></i>
          <i class="fa fa-phone"></i>
        </div>

        <h1>Download iChat for Windows</h1>
        <p>Get extra features like voice messages, stories, groups and more.</p>
        <button>Download</button>

        <div class="quick-actions">
          <div><i class="fa fa-file"></i><span>Send document</span></div>
          <div><i class="fa fa-user-plus"></i><span>Add contact</span></div>
          <div><i class="fa fa-sparkles"></i><span>Ask iChat AI</span></div>
        </div>
      </div>
    </section>

    <footer class="message-input">
      <input id="messageInput" placeholder="Type a message">
      <label><i class="fa fa-paperclip"></i><input id="fileInput" type="file" hidden></label>
      <button id="sendBtn"><i class="fa fa-paper-plane"></i></button>
    </footer>

  </main>
</div>

<div id="storyViewer" class="story-viewer">
  <button onclick="closeStoryViewer()">×</button>
  <div id="storyTextBox"></div>
  <img id="storyImage">
</div>

<div id="profileModal" class="modal">
  <div class="modal-box">
    <button class="close" onclick="closeProfileModal()">×</button>
    <h2>Edit Profile</h2>
    <input id="editUsername" placeholder="Username">
    <input id="editBio" placeholder="Bio">
    <input id="editAvatarFile" type="file">
    <button id="saveProfileBtn">Save Profile</button>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-box">
    <button class="close" onclick="closeSettingsModal()">×</button>
    <h2>Settings</h2>
    <label><input id="darkModeToggle" type="checkbox" checked> Dark Mode</label>
    <label><input id="notifyToggle" type="checkbox" checked> Notifications</label>
    <button id="deleteAccountBtn" class="danger">Delete Account</button>
  </div>
</div>

<script type="module" src="js/chat.js"></script>
</body>
</html>
